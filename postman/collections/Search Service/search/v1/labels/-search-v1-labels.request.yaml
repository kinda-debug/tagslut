$kind: http-request
name: /search/v1/labels
description: Returns a set of label results
url: "{{baseUrl}}/search/v1/labels?q=string&count=20"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: q
    value: string
    description: Search query text
  - key: count
    value: "20"
    description: The number of results returned in the response
auth:
  type: bearer
  credentials:
    token: "{{bearerToken}}"
examples: ./.resources/-search-v1-labels.resources/examples
order: 1000
