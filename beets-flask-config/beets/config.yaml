# Beets sidecar config for tagslut (Beets is a bridge, not the authority).
#
# Sidecar defaults:
# - no renames/reorg
# - no file writes
# - Beets DB is a secondary index + UI
#
# Container-friendly defaults:
# - `library` lives under `/config`
# - music files are readable under `/music`
library: /config/library.db
directory: /music

import:
  copy: no
  move: no
  link: no
  hardlink: no
  write: no
  resume: ask
  incremental: yes
  incremental_skip_later: yes
  quiet_fallback: skip
  timid: yes
  log: /config/beets-import.log

# Do not let Beets reorganize paths in sidecar mode (even if move/copy is later enabled).
paths:
  default: $path

plugins:
  # UI (used by beets-flask or any Beets web sidecar).
  - web

  # Core helpers (kept non-destructive via config defaults below).
  - musicbrainz
  - fetchart
  - embedart
  - zero
  - types

  # Provider helpers (external).
  - beatport4
  # - bandcamp   # provided by `beetcamp` (plugin name remains `bandcamp`)

  # Optional analysis (core / external).
  # - keyfinder
  # - autobpm
  # - replaygain
  # - xtractor

# Be conservative about MusicBrainz: keep it enabled for general matching,
# but do not let it inject genres by default (tagslut owns genre normalization).
musicbrainz:
  enabled: yes
  genres: no
  external_ids:
    bandcamp: yes
    beatport: yes
    tidal: yes

# Useful for querying tagslut-sidecar flexible attributes using range queries.
# (`types` supports: int, float, bool, date)
types:
  ts_canonical_bpm: float
  ts_replay_gain_track: float
  ts_replay_gain_album: float
  ts_tidal_dj_ready: int
  ts_tidal_stem_ready: int
  ts_canonical_year: int
  ts_canonical_explicit: bool

# Beatport API v4 plugin (external: `beets-beatport4`).
beatport4:
  art: no
  art_overwrite: no
  art_width: 0
  art_height: 0
  singletons_with_album_metadata:
    enabled: no
    year: yes
    album: yes
    label: yes
    catalognum: yes
    albumartist: yes
    track_number: yes
  username: ""
  password: ""
  client_id: ""

# Artwork helpers (core).
#
# Default is "no writes": keep these off by default; use manual commands if needed.
fetchart:
  auto: no
  cautious: yes
  minwidth: 500
  maxwidth: 1200
  enforce_ratio: yes
  store_source: yes
  high_resolution: no
  sources:
    - filesystem
    - cover_art_url
    - coverart
    - itunes

embedart:
  auto: no
  ifempty: yes
  compare_threshold: 0
  maxwidth: 1200

# Cleanup helper (core).
#
# Keep disabled by default; it can modify file tags if you run it intentionally.
zero:
  auto: no
  update_database: yes
  fields:
    - acoustid_id
    - encoder

# Optional plugin configs (disabled by default via `auto: no`).
keyfinder:
  auto: no
  bin: keyfinder-cli
  overwrite: no

autobpm:
  auto: no
  force: no
  beat_track_kwargs: {}
  quiet: no

replaygain:
  auto: no
  backend: ffmpeg
  overwrite: no

# beetcamp configuration (external: `beetcamp`, plugin name `bandcamp`).
bandcamp:
  include_digital_only_tracks: true
  search_max: 2
  art: no
  comments_separator: "\n---\n"
  truncate_comments: no
  exclude_extra_fields: []
  genre:
    capitalize: no
    maximum: 0
    always_include: []
    mode: progressive

# Xtractor is real but heavy (external: `beets-xtractor`).
# Keep disabled by default; enable deliberately and fill paths.
#
# xtractor:
#   auto: no
#   dry-run: no
#   write: yes
#   threads: 1
#   force: no
#   quiet: no
#   keep_output: yes
#   keep_profiles: no
#   output_path: /config/xtraction_data
#   essentia_extractor: /path/to/streaming_extractor_music
#   extractor_profile:
#     highlevel:
#       svm_models:
#         - /path/to/danceability.history
#         - /path/to/gender.history
#         - /path/to/genre_rosamerica.history
#         - /path/to/mood_acoustic.history
#         - /path/to/mood_aggressive.history
#         - /path/to/mood_electronic.history
#         - /path/to/mood_happy.history
#         - /path/to/mood_sad.history
#         - /path/to/mood_party.history
#         - /path/to/mood_relaxed.history
#         - /path/to/voice_instrumental.history
#         - /path/to/moods_mirex.history

web:
  host: 0.0.0.0
  port: 8337
  include_paths: yes
  readonly: true
