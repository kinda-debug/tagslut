$kind: http-request
description: Returns a paginated list of tracks belonging to a specific Beatport
  release. Fetches up to 100 tracks per page. Used to bulk-enrich track
  identities when ingesting an entire release into the tagslut v3 database
  during the intake pipeline.
url: "{{base_url}}/v4/catalog/releases/{{beatport_test_release_id}}/tracks/?per\
  _page=100"
method: GET
queryParams:
  per_page: "100"
order: 5000
