
[project]
name = "dedupe"
version = "0.9.0"
description = "Audio recovery and reconciliation toolkit"
readme = { file = "README.md", content-type = "text/markdown" }
authors = [{ name = "Georges Khawam", email = "tagslut@example.com" }]
license = { file = "LICENSE" }
requires-python = ">=3.10"
dependencies = [
    "mutagen>=1.47.0",
    "tqdm>=4.66",
    "tomli>=2.0.1; python_version < \"3.11\"",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Sound/Audio",
    "Topic :: Utilities",
]

[project.urls]
Homepage = "https://github.com/tagslut/dedupe"
Repository = "https://github.com/tagslut/dedupe"
Issues = "https://github.com/tagslut/dedupe/issues"

[project.scripts]
dedupe = "dedupe.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["dedupe"]
exclude = ["tests", "archive", "artifacts", "out", "runs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
