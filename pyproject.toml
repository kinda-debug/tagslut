[project]
name = "dedupe"
version = "0.1.0"
description = "Audio deduplication and recovery toolkit"
authors = [{ name = "[AUTHOR]", email = "[AUTHOR_EMAIL]" }]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mutagen>=1.47.0",
]

[project.scripts]
dedupe = "dedupe.cli:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["dedupe"]
exclude = ["tests", "archive", "artifacts", "out", "runs"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
