# tagslut runnable environment — runtime/config variables only.
# Operator variables (DB paths, volume roots, etc.) live in env.environment.yaml.
# initial_value is intentionally empty for tokens and runtime-written vars.

name: tagslut
variables:
  # --- Beatport base ---
  - key: base_url
    initial_value: "https://api.beatport.com"
    description: Beatport v4 API base URL

  # --- Beatport auth ---
  - key: beatport_client_id
    initial_value: ""
    description: OAuth client ID — set before running Auth folder

  - key: beatport_client_secret
    initial_value: ""
    description: OAuth client secret — set before running Auth folder

  - key: beatport_access_token
    initial_value: ""
    description: Set by Auth > Get Beatport Token

  - key: beatport_token_expires_at
    initial_value: ""
    description: Set by Auth > Get Beatport Token (epoch seconds)

  # --- Beatport runtime (written by collection scripts) ---
  - key: beatport_last_isrc
    initial_value: ""
    description: Last ISRC returned by Identity Verification > 5a

  - key: beatport_last_track_id
    initial_value: ""
    description: Last track ID returned by Catalog > Track by ID or Validation Run > 6b

  - key: beatport_verified_id
    initial_value: ""
    description: Set by Validation Run > 6b after a successful track lookup

  - key: beatport_verified_isrc
    initial_value: ""
    description: Set by Validation Run > 6b

  # --- Beatport static test fixtures ---
  - key: beatport_test_isrc
    initial_value: "USQX91300105"
    description: "VALIDATED: Instant Crush — Daft Punk"

  - key: beatport_test_track_id
    initial_value: ""
    description: Static Beatport track ID for smoke tests

  - key: beatport_test_release_id
    initial_value: ""
    description: Static Beatport release ID for smoke tests

  - key: beatport_search_query
    initial_value: "Instant Crush"
    description: Default search query for Search folder

  # --- TIDAL ---
  - key: tidal_access_token
    initial_value: ""
    description: Bearer token for TIDAL v2 JSON:API (openapi.tidal.com/v2)

  - key: tidal_seed_track_id
    initial_value: ""
    description: Set by Identity Verification > 5b after ISRC cross-check

  - key: tidal_seed_isrc
    initial_value: ""
    description: Set by Identity Verification > 5b

  # --- Spotify ---
  - key: spotify_access_token
    initial_value: ""
    description: Bearer token for Spotify Web API

  - key: spotify_verified_id
    initial_value: ""
    description: Set by Identity Verification > 5c
