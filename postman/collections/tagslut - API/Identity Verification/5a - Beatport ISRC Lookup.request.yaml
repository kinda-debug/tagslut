$kind: http-request
description: Looks up a track by the most recently processed ISRC (stored in
  beatport_last_isrc). Step 5a in the identity verification workflow. Compares
  the Beatport catalog response for a known ISRC to confirm round-trip data
  integrity after enrichment.
url: "{{base_url}}/v4/catalog/tracks/?isrc={{beatport_last_isrc}}"
method: GET
queryParams:
  isrc: "{{beatport_last_isrc}}"
auth:
  type: bearer
  credentials:
    token: "{{beatport_access_token}}"
scripts:
  - type: afterResponse
    code: >-
      var code = pm.response.code;

      console.log('[5a] Status: ' + code);


      if (code !== 200) {
          console.log('[5a] FAILED — body: ' + pm.response.text().substring(0, 300));
          return;
      }


      var json = pm.response.json();

      var results = json.results || (Array.isArray(json) ? json : []);


      if (!results.length) {
          console.log('[5a] WARNING: Beatport returned 0 results for ISRC ' +
              pm.environment.get('beatport_last_isrc'));
          return;
      }


      var track = results[0];

      var bpId   = track.id;

      var bpIsrc = track.isrc;


      pm.environment.set('beatport_verified_id',   bpId);

      pm.environment.set('beatport_verified_isrc', bpIsrc);


      console.log('[5a] beatport_verified_id   = ' + bpId);

      console.log('[5a] beatport_verified_isrc = ' + bpIsrc);

      console.log('[5a] Results in page: ' + results.length +
          (json.count !== undefined ? ' / total: ' + json.count : ''));
    language: text/javascript
order: 1000
