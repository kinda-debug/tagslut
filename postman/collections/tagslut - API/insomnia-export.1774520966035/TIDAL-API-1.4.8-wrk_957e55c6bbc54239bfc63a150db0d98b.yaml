    info:
      contact:
        name: TIDAL Developer - Discussions
        url: https://github.com/orgs/tidal-music/discussions
      description: The TIDAL API is a [JSON:API](https://jsonapi.org/)–compliant web
        API that exposes TIDAL’s music, metadata, and user-related functionality
        through a consistent, resource-oriented design. More information and API
        management are available at
        [developer.tidal.com](https://developer.tidal.com)
      termsOfService: https://developer.tidal.com/documentation/guidelines/guidelines-overview
      title: TIDAL API
      version: 1.4.8
    externalDocs:
      description: TIDAL Developer - Documentation
      url: https://developer.tidal.com/documentation
    servers:
      - url: https://openapi.tidal.com/v2
        description: Production
    tags:
      - description: A record of a user's acceptance of terms and conditions.
        name: acceptedTerms
      - description: Playback statistics for an album, including total plays, unique
          listeners, and sales.
        name: albumStatistics
