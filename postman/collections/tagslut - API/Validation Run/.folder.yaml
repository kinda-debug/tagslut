$kind: folder
scripts:
  - type: beforeRequest
    language: text/javascript
    code: |-
      // Auto-refresh TIDAL access token before each Validation Run request
      var expiresAt = parseInt(pm.environment.get('tidal_token_expires_at') || '0');
      var secondsLeft = (expiresAt - Date.now()) / 1000;

      if (expiresAt && secondsLeft > 60) {
          console.log('[TIDAL auth] Token valid for ' + secondsLeft.toFixed(0) + 's — skipping refresh.');
          return;
      }

      var refreshToken = pm.environment.get('tidal_refresh_token');
      var clientId     = pm.environment.get('tidal_client_id');
      var clientSecret = pm.environment.get('tidal_client_secret');

      if (!refreshToken) {
          throw new Error('[TIDAL auth] tidal_refresh_token is not set in the environment. ' +
              'Run `tagslut auth login tidal` locally, then copy the refresh_token from ' +
              '~/.config/tagslut/tokens.json into the env.');
      }
      if (!clientId || !clientSecret) {
          throw new Error('[TIDAL auth] tidal_client_id or tidal_client_secret is missing from the environment.');
      }

      var basicCreds = btoa(clientId + ':' + clientSecret);

      pm.sendRequest({
          url: 'https://auth.tidal.com/v1/oauth2/token',
          method: 'POST',
          header: {
              'Content-Type': 'application/x-www-form-urlencoded',
              'Authorization': 'Basic ' + basicCreds
          },
          body: {
              mode: 'urlencoded',
              urlencoded: [
                  { key: 'grant_type',    value: 'refresh_token' },
                  { key: 'refresh_token', value: refreshToken },
                  { key: 'client_id',     value: clientId },
                  { key: 'scope',         value: 'r_usr+w_usr+w_sub' }
              ]
          }
      }, function (err, res) {
          if (err) {
              throw new Error('[TIDAL auth] Request error: ' + err);
          }
          if (res.code !== 200) {
              throw new Error('[TIDAL auth] Token refresh failed (' + res.code + '): ' +
                  res.text().substring(0, 300));
          }
          var data = res.json();
          pm.environment.set('tidal_access_token', data.access_token);
          pm.environment.set('tidal_token_expires_at',
              String(Date.now() + (data.expires_in || 86400) * 1000));
          console.log('[TIDAL auth] Token refreshed. Expires in ' +
              (data.expires_in || 86400) + 's.');
      });
