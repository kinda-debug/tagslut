# COMMUNE Configuration File
# This file contains default settings for the COMMUNE-oriented dedupe tools
# Edit these values to customize the behavior of dedupe commands

[library]
name = "COMMUNE"
root = "/Volumes/COMMUNE"

[library.zones]
inbox = "00_INBOX"
staging = "10_STAGING"
accepted = "20_ACCEPTED"
rejected = "90_REJECTED"
yate_db = "_yate_db"

[decisions]
zone_priority = ["accepted", "staging"]

[scan]
# Number of worker threads for scanning
workers = 8

# Enable verbose output by default
verbose = false

# Force recomputation of fingerprints
recompute = false

# Timeout settings (seconds)
cmd_timeout = 10
decode_timeout = 30

# Skip broken files instead of aborting
skip_broken = true

# Auto-reject files that cause freezes
auto_reject = false

# Watchdog timeout (seconds)
watchdog_timeout = 300

# Dump fpcalc output for debugging
dump_fpcalc = true

[repair]
# Output directory for repaired files (relative to root if not absolute)
output_dir = ""

# Overwrite existing playlist
overwrite_playlist = true

# Capture stderr output
capture_stderr = false

# FFmpeg arguments for repair
ffmpeg_args = "-err_detect ignore_err -c:a flac"

# Timeout for repair operations
timeout = 300

[dedupe]
# Enable verbose output
verbose = true

# Actually move duplicate files (dangerous!)
commit = false

# Custom trash directory (relative to root if not absolute)
trash_dir = ""

# Similarity thresholds
fp_sim_ratio = 0.62
fp_sim_shift = 25
fp_sim_min_overlap = 50

# Segment matching
segwin_min_matches = 3

# Fuzzy filename matching tolerance (seconds)
fuzzy_seconds = 2.0

[workflow]
# Enable verbose output for workflow
verbose = false

# Commit deduplication step in workflow
commit = false

[cleanup]
# Remove empty broken files playlist after successful repair
remove_empty_playlist = true

# Clean Python cache directories
clean_pycache = true
