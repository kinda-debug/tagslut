# Example Configuration (COMMUNE)
# Copy this to config.toml and customize as needed

[library]
name = "COMMUNE"
root = "/Volumes/COMMUNE"

[db]
# Primary integrity database path
path = "/path/to/music.db"
min_disk_space_mb = 50
write_sanity_check = true

[library.zones]
inbox = "00_INBOX"
staging = "10_STAGING"
accepted = "20_ACCEPTED"
rejected = "90_REJECTED"
yate_db = "_yate_db"

[integrity]
# Defaults for legacy/tools/integrity/scan.py (legacy scanner)
verbose = true
progress = true
progress_interval = 1
incremental = true
recheck = false
force_all = false
check_integrity = false
check_hash = false
stale_days = 30
parallel_workers = 1
db_write_batch_size = 50
db_flush_interval = 60
allow_unzoned_paths = true
default_zone = "accepted"

[scan]
# Number of worker threads for scanning (more = faster, but uses more CPU)
workers = 8

# Enable verbose output by default
verbose = false

# Force recomputation of fingerprints (slower but more accurate)
recompute = false

# Timeout settings in seconds
cmd_timeout = 10
decode_timeout = 30

# Skip broken files instead of aborting scan
skip_broken = true

# Auto-reject files that cause freezes
auto_reject = false

# Watchdog timeout (seconds) - how long to wait before warning
watchdog_timeout = 300

# Dump fpcalc output for debugging
dump_fpcalc = true

[repair]
# Output directory for repaired files (leave empty for auto)
output_dir = ""

# Overwrite existing playlist
overwrite_playlist = true

# Capture stderr output
capture_stderr = false

# FFmpeg arguments for repair
ffmpeg_args = "-err_detect ignore_err -c:a flac"

# Timeout for repair operations
timeout = 300

# Decision engine defaults (report-only guidance)
[decisions]
zone_priority = ["accepted", "staging"]
metadata_tiebreaker = true

[dedupe]
# Enable verbose output
verbose = true

# Actually move duplicate files (dangerous! set to false for safety)
commit = false

# Custom trash directory (leave empty for auto)
trash_dir = ""

# Similarity thresholds (lower = more aggressive deduplication)
fp_sim_ratio = 0.62
fp_sim_shift = 25
fp_sim_min_overlap = 50

# Segment matching requirements
segwin_min_matches = 3

# Fuzzy filename matching tolerance (seconds)
fuzzy_seconds = 2.0

[workflow]
# Enable verbose output for workflow
verbose = false

# Commit deduplication step in workflow
commit = false

[cleanup]
# Remove empty broken files playlist after successful repair
remove_empty_playlist = true

# Clean Python cache directories
clean_pycache = true
