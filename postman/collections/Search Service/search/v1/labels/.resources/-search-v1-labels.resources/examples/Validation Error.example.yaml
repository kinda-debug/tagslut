$kind: http-example
request:
  url: "{{baseUrl}}/search/v1/labels?q=string&count=20"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: Bearer <token>
      description: "Added as a part of security scheme: bearer"
  queryParams:
    - key: q
      value: string
      description: Search query text
    - key: count
      value: "20"
      description: The number of results returned in the response
response:
  statusCode: 422
  statusText: Unprocessable Entity (WebDAV) (RFC 4918)
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "detail": [
          {
            "loc": [
              "string",
              "string"
            ],
            "msg": "string",
            "type": "string"
          },
          {
            "loc": [
              "string",
              4904
            ],
            "msg": "string",
            "type": "string"
          }
        ]
      }
order: 2000
