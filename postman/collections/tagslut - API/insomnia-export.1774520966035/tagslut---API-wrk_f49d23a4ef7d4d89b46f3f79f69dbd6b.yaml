      description: Postman collection for the tagslut music library management system.
        Covers Beatport API v4 authentication, catalog lookups (tracks,
        releases, ISRC), full-text search, and authenticated user library
        access. Used to enrich track metadata, resolve ISRCs, and drive the DJ
        pipeline ingestion workflow.
    children:
      - name: Auth
        meta:
          id: fld_1a08644fb887447a8d42a6072f483510
          created: 1774520220921
          modified: 1774520220921
          sortKey: -1774520212346
          description: OAuth2 Client Credentials flow for DJ app token.
        children:
          - url: "{{base_url}}/v4/auth/o/token/"
            name: Get Token (Client Credentials)
            meta:
              id: req_15a92cc36fe348fc93414105cd4951f6
              created: 1774520220922
              modified: 1774520220922
              isPrivate: false
              description: ""
              sortKey: -1774520212345
            method: POST
            body:
              mimeType: application/x-www-form-urlencoded
              params:
                - name: grant_type
                  value: client_credentials
                  disabled: false
                - name: client_id
                  value: "{{beatport_client_id}}"
                  disabled: false
                - name: client_secret
                  value: "{{beatport_client_secret}}"
                  disabled: false
            headers:
              - name: Content-Type
                value: application/x-www-form-urlencoded
            scripts:
              preRequest: >-
                var expiresAt =
                insomnia.environment.get('beatport_token_expires_at');

                if (expiresAt) {
                    var secondsLeft = (parseInt(expiresAt) - Date.now()) / 1000;
                    if (secondsLeft < 60) {
                        console.warn('WARNING: Beatport token expires in ' + secondsLeft.toFixed(0) + 's — fetching new token.');
                    }
                }
              afterResponse: >-
                if (insomnia.response.code === 200) {
                    var json = insomnia.response.json();
                    if (json.access_token) {
                        insomnia.environment.set('beatport_access_token', json.access_token);
                        insomnia.environment.set('beatport_token_expires_at', String(Date.now() + (json.expires_in * 1000)));
                        console.log('Token set. Expires in: ' + json.expires_in + 's');
                    }
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/auth/o/introspect/"
            name: Introspect Token
            meta:
              id: req_8cf713bd7ec3449bb4bd6028fd4d1dd3
              created: 1774520220923
              modified: 1774520220923
              isPrivate: false
              description: ""
              sortKey: -1774520212344
            method: GET
            authentication:
              type: bearer
              disabled: false
              token: "{{beatport_access_token}}"
              prefix: ""
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
      - name: Catalog
        meta:
          id: fld_cbeecd5042ff4e14a5d9ed3509529596
          created: 1774520220923
          modified: 1774520220923
          sortKey: -1774520212343
          description: >-
            Catalog endpoints. /v4/catalog/tracks/ accepts Bearer, basic, or
            cookie.

            /v4/catalog/tracks/store/{isrc}/ per OAS requires cookie or basic
            only.

            Phase 3d test: compare store/{isrc} vs ?isrc= response shape.
        children:
          - url: "{{base_url}}/v4/catalog/tracks/"
            name: Tracks by ISRC (query param)
            meta:
              id: req_e3bc86afcd344d5299c08268c18f1bd5
              created: 1774520220924
              modified: 1774520220924
              isPrivate: false
              description: ""
              sortKey: -1774520212341
            method: GET
            parameters:
              - name: isrc
                value: "{{beatport_test_isrc}}"
                disabled: false
            scripts:
              afterResponse: >-
                // Phase 3d: log response shape for comparison with store/{isrc}

                if (insomnia.response.code === 200) {
                    var json = insomnia.response.json();
                    console.log('Type: ' + typeof json);
                    console.log('Is array: ' + Array.isArray(json.results || json));
                    console.log('Has count: ' + ('count' in json));
                    console.log('Has results: ' + ('results' in json));
                    if (json.results) console.log('Results count: ' + json.results.length);
                    if (json.results && json.results[0]) {
                        console.log('First result keys: ' + Object.keys(json.results[0]).join(', '));
                    }
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/catalog/tracks/{{beatport_test_track_id}}/"
            name: Track by ID
            meta:
              id: req_eb04169692bd4e8e8e35914828956e40
              created: 1774520220924
              modified: 1774520220924
              isPrivate: false
              description: ""
              sortKey: -1774520212342
            method: GET
            authentication:
              type: bearer
              disabled: false
              token: "{{beatport_access_token}}"
              prefix: ""
            scripts:
              afterResponse: >-
                var code = insomnia.response.code;

                console.log('Status: ' + code);


                if (code !== 200) {
                    console.log('FAILED — body: ' + insomnia.response.text().substring(0, 300));
                    return;
                }


                var json = insomnia.response.json();


                // ── Canonical field validation
                ────────────────────────────────────────

                var canonical = ['id', 'isrc', 'name', 'artists', 'bpm', 'key',
                'genre', 'mix_name'];

                canonical.forEach(function(f) {
                    var val = json[f];
                    if (val === null || val === undefined) {
                        console.log('WARNING: missing field ' + f);
                    } else {
                        console.log(f + ': ' + JSON.stringify(val).substring(0, 80));
                    }
                });


                // release.label is nested — check separately

                var label = json.release && json.release.label;

                if (!label) {
                    console.log('WARNING: missing field release.label');
                } else {
                    console.log('release.label: ' + JSON.stringify(label).substring(0, 80));
                }


                // ── Provider-linkable bonus fields
                ────────────────────────────────────

                var bonus = ['upc', 'copyright', 'version', 'explicit',
                'audioQuality'];

                var found = [];

                bonus.forEach(function(f) {
                    if (json[f] !== null && json[f] !== undefined) {
                        found.push(f + '=' + JSON.stringify(json[f]).substring(0, 40));
                    }
                });

                if (found.length > 0) {
                    console.log('Provider-linkable fields present: ' + found.join(', '));
                } else {
                    console.log('No provider-linkable bonus fields found in this response.');
                }


                // ── Chain variables
                ───────────────────────────────────────────────────

                if (json.id) {
                    insomnia.environment.set('beatport_last_track_id', json.id);
                    console.log('Set beatport_last_track_id = ' + json.id);
                }

                if (json.isrc) {
                    insomnia.environment.set('beatport_last_isrc', json.isrc);
                    console.log('Set beatport_last_isrc = ' + json.isrc);
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/catalog/tracks/store/{{beatport_test_isrc}}/"
            name: ISRC Store Lookup (path-based) [Phase 3d]
            meta:
              id: req_f2eb48e614dc4e2e9214707392d3d037
              created: 1774520220924
              modified: 1774520220924
              isPrivate: false
              description: ""
              sortKey: -1774520212340
            method: GET
            authentication:
              type: basic
              username: "{{beatport_client_id}}"
              password: "{{beatport_client_secret}}"
              disabled: false
            scripts:
              afterResponse: >-
                console.log('Status: ' + insomnia.response.code);

                if (insomnia.response.code === 200) {
                    var json = insomnia.response.json();

                    // Response shape detection
                    var isPaginated = ('results' in json && 'count' in json);
                    var isDirect = ('id' in json && 'isrc' in json);
                    console.log('Response shape: ' + (isPaginated ? 'PAGINATED WRAPPER' : isDirect ? 'DIRECT RECORD' : 'UNKNOWN'));

                    // Field presence
                    var fields = ['id', 'isrc', 'name', 'artists', 'bpm', 'key', 'genre'];
                    var record = isPaginated ? (json.results && json.results[0]) : json;
                    if (record) {
                        fields.forEach(function(f) {
                            console.log('  ' + f + ': ' + (f in record ? JSON.stringify(record[f]).substring(0, 80) : 'MISSING'));
                        });
                    } else {
                        console.log('No record to inspect.');
                    }
                } else {
                    console.log('FAILED (' + insomnia.response.code + ') — check auth: try Basic (client_id/secret) or session cookie');
                    console.log('Body: ' + insomnia.response.text().substring(0, 200));
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/catalog/releases/{{beatport_test_release_id}}/"
