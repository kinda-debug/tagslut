name: dj_curation_usb
version: 2026-02-23.dj_curation.v3
description: Ultra-relaxed DJ curation rules for USB audition material.
lane: dj
rules:
  duration_min: 120
  duration_max: 720
  bpm_min: 80
  bpm_max: 200
  bpm_optimal_min: 120
  bpm_optimal_max: 135
  score_safe_min: 1
  score_block_max: -2
  artist_blocklist_path: config/blocklists/non_dj_artists.txt
  artist_reviewlist_path: config/blocklists/borderline_artists.txt
  genre_filters: []
  genres_allow:
    - world
    - experimental
    - indie dance
    - melodic house
    - techno
    - house
    - disco
  anti_dj_genres: []
