$kind: collection
description: >-
  Purpose-built collection for tagslut Beatport provider development.


  Auth model:

  - Search service (/search/v1/*): Bearer token (OAuth2 / DJ app)

  - Catalog list+detail (/v4/catalog/tracks/, /v4/catalog/tracks/{id}/): Bearer,
  basic, or cookie

  - Catalog ISRC store (/v4/catalog/tracks/store/{isrc}/): cookie or basic ONLY
  per OAS spec

  - My Library (/v4/my/*): Bearer token

  - Auth endpoints: client_id + client_secret


  Environment variables required:

  - beatport_client_id, beatport_client_secret

  - beatport_access_token (auto-set by Auth > Get Token)

  - beatport_test_isrc (set manually for ISRC tests)

  - beatport_test_track_id (set manually for track detail tests)
variables:
  base_url: https://api.beatport.com
auth:
  - id: f13e0e07-dcfe-42aa-9f4e-28ff77b34c4e
    type: bearer
    name: bearer auth
    credentials:
      token: "{{beatport_access_token}}"
