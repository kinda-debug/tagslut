      - name: Identity Verification
        meta:
          id: fld_5e260117c86a46aebcb9c717651fc89d
          created: 1774520220927
          modified: 1774520220927
          sortKey: -1774520212332
          description: Endpoints for verifying and cross-referencing track identities
            between Beatport catalog data and the local tagslut v3 database.
            Used during Phase 3 testing to validate ISRC resolution accuracy and
            response shape consistency.
        children:
          - url: "{{base_url}}/v4/catalog/tracks/"
            name: 5a - Beatport ISRC Lookup
            meta:
              id: req_d9668f6eebc242319fa0d2c9a8e44013
              created: 1774520220927
              modified: 1774520220927
              isPrivate: false
              description: ""
              sortKey: -1774520212331
            method: GET
            parameters:
              - name: isrc
                value: "{{beatport_last_isrc}}"
                disabled: false
            authentication:
              type: bearer
              disabled: false
              token: "{{beatport_access_token}}"
              prefix: ""
            scripts:
              afterResponse: >-
                var code = insomnia.response.code;

                console.log('[5a] Status: ' + code);


                if (code !== 200) {
                    console.log('[5a] FAILED — body: ' + insomnia.response.text().substring(0, 300));
                    return;
                }


                var json = insomnia.response.json();

                var results = json.results || (Array.isArray(json) ? json : []);


                if (!results.length) {
                    console.log('[5a] WARNING: Beatport returned 0 results for ISRC ' +
                        insomnia.environment.get('beatport_last_isrc'));
                    return;
                }


                var track = results[0];

                var bpId   = track.id;

                var bpIsrc = track.isrc;


                insomnia.environment.set('beatport_verified_id',   bpId);

                insomnia.environment.set('beatport_verified_isrc', bpIsrc);


                console.log('[5a] beatport_verified_id   = ' + bpId);

                console.log('[5a] beatport_verified_isrc = ' + bpIsrc);

                console.log('[5a] Results in page: ' + results.length +
                    (json.count !== undefined ? ' / total: ' + json.count : ''));
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: https://api.spotify.com/v1/search
            name: 5c - Spotify ISRC Cross-Check
            meta:
              id: req_480c200860524f338ee2673c43996d60
              created: 1774520220928
              modified: 1774520220928
              isPrivate: false
              description: ""
              sortKey: -1774520212329
            method: GET
            parameters:
              - name: q
                value: isrc:{{beatport_verified_isrc}}
                disabled: false
              - name: type
                value: track
                disabled: false
            authentication:
              type: bearer
              disabled: false
              token: "{{spotify_access_token}}"
              prefix: ""
            scripts:
              afterResponse: >-
                var code = insomnia.response.code;

                console.log('[5c] Status: ' + code);


                if (code === 401) {
                    console.log('[5c] FAILED — 401 Unauthorized. Refresh spotify_access_token.');
                    return;
                }

                if (code !== 200) {
                    console.log('[5c] FAILED — body: ' + insomnia.response.text().substring(0, 300));
                    return;
                }


                var json  = insomnia.response.json();

                var items = json.tracks && json.tracks.items ? json.tracks.items
                : [];


                if (!items.length) {
                    console.log('[5c] WARNING: Spotify returned 0 results for ISRC ' +
                        insomnia.environment.get('beatport_verified_isrc'));
                    return;
                }


                var track        = items[0];

                var spotifyIsrc  = track.external_ids &&
                track.external_ids.isrc;

                var beatportIsrc =
                insomnia.environment.get('beatport_verified_isrc');


                console.log('[5c] beatport_isrc = ' + beatportIsrc);

                console.log('[5c] spotify_isrc  = ' + spotifyIsrc);


                if (spotifyIsrc && beatportIsrc && spotifyIsrc === beatportIsrc)
                {
                    console.log('[5c] CORROBORATED — Beatport + TIDAL + Spotify all agree: ' + beatportIsrc);
                } else {
                    console.log('[5c] CONFLICT: beatport_isrc=' + beatportIsrc +
                        ' spotify_isrc=' + spotifyIsrc);
                }


                // Log Spotify enrichment fields useful for provenance

                var extras = ['id', 'name', 'duration_ms', 'explicit',
                'popularity'];

                var found  = [];

                extras.forEach(function(f) {
                    if (track[f] !== null && track[f] !== undefined) {
                        found.push(f + '=' + JSON.stringify(track[f]).substring(0, 40));
                    }
                });

                if (found.length) {
                    console.log('[5c] Spotify enrichment fields: ' + found.join(', '));
                }


                // Store spotify_id for provenance

                if (track.id) {
                    insomnia.environment.set('spotify_verified_id', track.id);
                    console.log('[5c] Set spotify_verified_id = ' + track.id);
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: https://api.tidal.com/v1/tracks
            name: 5b - TIDAL ISRC Cross-Check
            meta:
              id: req_71e8fbdf02c54b17b32fa94ade5da642
              created: 1774520220928
              modified: 1774520220928
              isPrivate: false
              description: ""
              sortKey: -1774520212330
            method: GET
            parameters:
              - name: isrc
                value: "{{beatport_verified_isrc}}"
                disabled: false
              - name: countryCode
                value: US
                disabled: false
            authentication:
              type: bearer
              disabled: false
              token: "{{tidal_access_token}}"
              prefix: ""
            scripts:
              afterResponse: >-
                var code = insomnia.response.code;

                console.log('[5b] Status: ' + code);


                if (code !== 200) {
                    console.log('[5b] TIDAL request FAILED — body: ' +
                        insomnia.response.text().substring(0, 300));
                    return;
                }


                var json  = insomnia.response.json();

                var items = json.items || (Array.isArray(json) ? json : []);


                if (!items.length) {
                    console.log('[5b] WARNING: TIDAL returned 0 results for ISRC ' +
                        insomnia.environment.get('beatport_verified_isrc'));
                    return;
                }


                var tidalIsrc    = items[0].isrc;

                var beatportIsrc =
                insomnia.environment.get('beatport_verified_isrc');


                console.log('[5b] beatport_isrc = ' + beatportIsrc);

                console.log('[5b] tidal_isrc    = ' + tidalIsrc);


                if (tidalIsrc && beatportIsrc && tidalIsrc === beatportIsrc) {
                    console.log('[5b] CORROBORATED — both providers agree: ' + beatportIsrc);
                } else {
                    console.log('[5b] CONFLICT: beatport_isrc=' + beatportIsrc +
                        ' tidal_isrc=' + tidalIsrc);
                }


                // Log extra TIDAL fields useful for provenance enrichment

                var t = items[0];

                var extras = ['id', 'title', 'duration', 'explicit',
                'audioQuality', 'version'];

                var found = [];

                extras.forEach(function(f) {
                    if (t[f] !== null && t[f] !== undefined) {
                        found.push(f + '=' + JSON.stringify(t[f]).substring(0, 40));
                    }
                });

                if (found.length) {
                    console.log('[5b] TIDAL enrichment fields: ' + found.join(', '));
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
      - name: Validation Run
        meta:
          id: fld_8f940ffa601e40efb05aeba9833de6d0
          created: 1774520220929
          modified: 1774520220929
          sortKey: -1774520212328
          description: End-to-end validation run requests that walk through a complete
            ISRC resolution and cross-platform catalog check. Steps 6a+ resolve
            a known TIDAL or Beatport release down to individual ISRCs and
            verify each record across services.
        children:
          - url: https://example.com
            name: 6c - Run Notes
            meta:
              id: req_3a2429f890284b089245607e9779150e
              created: 1774520220929
              modified: 1774520220929
              isPrivate: false
              description: ""
              sortKey: -1774520212325
            method: GET
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: https://api.tidal.com/v1/albums/507881809/tracks
            name: 6a - Resolve TIDAL Album to ISRC
            meta:
              id: req_3bdfaabd5cd2419d83f997fc3cf6b7f0
              created: 1774520220929
              modified: 1774520220929
              isPrivate: false
              description: ""
              sortKey: -1774520212327
            method: GET
            parameters:
              - name: countryCode
                value: US
                disabled: false
            authentication:
              type: bearer
              disabled: false
              token: "{{tidal_access_token}}"
              prefix: ""
            scripts:
              afterResponse: >-
                var code = insomnia.response.code;

                console.log('[6a] Status: ' + code);


                if (code !== 200) {
                    console.log('[6a] FAILED — body: ' + insomnia.response.text().substring(0, 400));
                    return;
                }


                var json  = insomnia.response.json();

                var items = json.items || (Array.isArray(json) ? json : []);


                if (!items.length) {
                    console.log('[6a] WARNING: album 507881809 returned 0 tracks.');
                    return;
                }


                var track = items[0];

                var isrc  = track.isrc;

                var tid   = track.id;


                if (!isrc) {
                    console.log('[6a] WARNING: first track has no ISRC field. Keys: ' +
                        Object.keys(track).join(', '));
                    return;
                }


                insomnia.environment.set('beatport_test_isrc',   isrc);

                insomnia.environment.set('tidal_seed_track_id',  String(tid));

                insomnia.environment.set('tidal_seed_isrc',      isrc);


                console.log('[6a] Seed track: "' + (track.title || track.name ||
                '?') +
                    '" by ' + (track.artist && track.artist.name ? track.artist.name : '?'));
                console.log('[6a] tidal_track_id        = ' + tid);

                console.log('[6a] beatport_test_isrc    = ' + isrc);

                console.log('[6a] tidal_seed_isrc       = ' + isrc);

                console.log('[6a] Total tracks in album : ' + items.length);
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/catalog/tracks/{{beatport_test_track_id}}/"
            name: 6b - Track by ID (Validation)
            meta:
              id: req_c874eb0089214f299f5c5c9d376c0a3c
              created: 1774520220929
              modified: 1774520220929
              isPrivate: false
              description: ""
              sortKey: -1774520212326
            method: GET
            authentication:
              type: bearer
              disabled: false
              token: "{{beatport_access_token}}"
              prefix: ""
            scripts:
              afterResponse: >-
                var code = insomnia.response.code;

                console.log('[6b] Status: ' + code);


                if (code !== 200) {
                    console.log('[6b] FAILED — body: ' + insomnia.response.text().substring(0, 300));
                    return;
                }


                var json = insomnia.response.json();


                // Canonical field validation

                var canonical = ['id', 'isrc', 'name', 'artists', 'bpm', 'key',
                'genre', 'mix_name'];

                canonical.forEach(function(f) {
                    var val = json[f];
                    if (val === null || val === undefined) {
                        console.log('[6b] WARNING: missing field ' + f);
                    } else {
                        console.log('[6b] ' + f + ': ' + JSON.stringify(val).substring(0, 80));
                    }
                });


                var label = json.release && json.release.label;

                if (!label) {
                    console.log('[6b] WARNING: missing field release.label');
                } else {
                    console.log('[6b] release.label: ' + JSON.stringify(label).substring(0, 80));
                }


                // Chain variables

                if (json.id) {
                    insomnia.environment.set('beatport_last_track_id', json.id);
                    console.log('[6b] Set beatport_last_track_id = ' + json.id);
                }

                if (json.isrc) {
                    insomnia.environment.set('beatport_last_isrc', json.isrc);
                    console.log('[6b] Set beatport_last_isrc = ' + json.isrc);
                }


                // ISRC agreement check against TIDAL seed

                var tidalSeedIsrc = insomnia.environment.get('tidal_seed_isrc');

                if (tidalSeedIsrc && json.isrc) {
                    if (json.isrc === tidalSeedIsrc) {
                        console.log('[6b] ISRC PRE-CHECK PASSED: Beatport ISRC matches TIDAL seed (' + json.isrc + ')');
                    } else {
                        console.log('[6b] ISRC PRE-CHECK FAILED: Beatport=' + json.isrc + ' TIDAL seed=' + tidalSeedIsrc);
                    }
                }
