name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'poetry'
      - name: Install Dependencies
        run: |
          pip install poetry
          poetry install
      - name: Run Type Checks
        run: poetry run python scripts/mypy_baseline_check.py
      - name: Run Tests
        run: poetry run pytest --cov=tagslut --cov-report=xml
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Run Repo Surface Audit
        run: poetry run python scripts/audit_repo_layout.py
      - name: Run CLI/Docs Consistency Audit
        run: poetry run python scripts/check_cli_docs_consistency.py
      - name: Run Policy Lint
        run: poetry run python scripts/lint_policy_profiles.py
