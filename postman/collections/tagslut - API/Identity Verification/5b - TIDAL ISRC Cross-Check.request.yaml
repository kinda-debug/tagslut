$kind: http-request
description: Cross-checks a Beatport-verified ISRC against the TIDAL catalog.
  Step 5b in the identity verification workflow. Queries the TIDAL v2 tracks API
  with the verified ISRC to confirm the track exists on TIDAL and to compare
  metadata for enrichment consistency. Uses JSON:API response shape
  (openapi.tidal.com/v2) — track fields are under data[].attributes.
url: https://openapi.tidal.com/v2/tracks?filter[isrc]={{beatport_verified_isrc}}&countryCode=US
method: GET
queryParams:
  filter[isrc]: "{{beatport_verified_isrc}}"
  countryCode: US
auth:
  type: bearer
  credentials:
    token: "{{tidal_access_token}}"
scripts:
  - type: afterResponse
    code: >-
      var code = pm.response.code;

      console.log('[5b] Status: ' + code);


      if (code !== 200) {
          console.log('[5b] TIDAL request FAILED — body: ' +
              pm.response.text().substring(0, 300));
          return;
      }


      if (!pm.environment.get('tidal_access_token')) {
          console.warn('[5b] WARNING: tidal_access_token is empty — request may have used no auth.');
      }


      // TIDAL v2 JSON:API: resources are in data[], not items[]
      var json = pm.response.json();
      var data = json.data || [];


      if (!data.length) {
          console.log('[5b] WARNING: TIDAL returned 0 results for ISRC ' +
              pm.environment.get('beatport_verified_isrc'));
          return;
      }


      var track        = data[0];
      var attrs        = track.attributes || {};
      var tidalIsrc    = attrs.isrc;
      var beatportIsrc = pm.environment.get('beatport_verified_isrc');


      console.log('[5b] beatport_isrc = ' + beatportIsrc);
      console.log('[5b] tidal_isrc    = ' + tidalIsrc);


      if (tidalIsrc && beatportIsrc && tidalIsrc === beatportIsrc) {
          console.log('[5b] CORROBORATED — both providers agree: ' + beatportIsrc);
      } else {
          console.log('[5b] CONFLICT: beatport_isrc=' + beatportIsrc +
              ' tidal_isrc=' + tidalIsrc);
      }


      // v2 enrichment fields — all under attributes; id is resource-level
      // audioQuality is NOT in v2 TracksAttributes; use mediaTags for quality tier
      var bonusV2 = ['bpm', 'key', 'keyScale', 'mediaTags', 'popularity',
                     'version', 'duration', 'explicit', 'toneTags', 'title'];
      var found = [];
      bonusV2.forEach(function(f) {
          if (attrs[f] !== null && attrs[f] !== undefined) {
              found.push(f + '=' + JSON.stringify(attrs[f]).substring(0, 40));
          }
      });
      if (track.id) found.push('id=' + track.id);
      if (found.length) {
          console.log('[5b] TIDAL v2 enrichment fields: ' + found.join(', '));
      }
    language: text/javascript
order: 2000
