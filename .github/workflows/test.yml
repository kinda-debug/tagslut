name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          pip install poetry
          poetry install
      - name: Run Type Checks
        run: poetry run mypy .
      - name: Run Tests
        run: poetry run pytest
