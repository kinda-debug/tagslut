[project]
name = "flac-dedupe"
version = "0.1.0"
description = "FLAC audio file deduplication tools with ScaReD CLI"
authors = [{ name = "Georges Khawam", email = "tagslut@example.com" }]
readme = "README.md"
requires-python = ">=3.8"

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["dedupe"]
exclude = ["tests", "archive", "artifacts", "out", "runs"]

[tool.poetry]
name = "flac-dedupe"
version = "0.1.0"
description = "FLAC audio file deduplication tools with ScaReD CLI"
authors = ["Georges Khawam <tagslut@example.com>"]
readme = "README.md"
packages = [{ include = "dedupe" }]

[tool.poetry.dependencies]
python = "^3.8.1"

[tool.poetry.group.dev.dependencies]
pytest = "^7.0.0"
black = "^23.0.0"
mypy = "^1.0.0"
flake8 = "^6.0.0"

[tool.poetry.scripts]
dedupe = "dedupe.cli:main"
analyze-quarantine-subdir = "dedupe.legacy_cli:analyse_quarantine_subdir_main"
simple-quarantine-scan = "dedupe.legacy_cli:simple_quarantine_scan_main"
detect-playback-length-issues = "dedupe.legacy_cli:detect_playback_length_issues_main"

[tool.black]
line-length = 88
target-version = ['py38']

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]