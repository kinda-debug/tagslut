[tool.poetry]
name = "flac-dedupe"
version = "0.1.0"
description = "FLAC audio file deduplication tools with ScaReD CLI"
authors = ["Georges Khawam <tagslut>"]
readme = "README.md"
packages = [{include = "*.py"}]

[tool.poetry.dependencies]
python = "^3.8.1"
# tomllib is in Python 3.11+ standard library, handled gracefully in code
# All other dependencies are standard library, but we document system requirements

[tool.poetry.group.dev.dependencies]
pytest = "^7.0.0"
black = "^23.0.0"
mypy = "^1.0.0"
flake8 = "^6.0.0"

[tool.poetry.scripts]
dedupe = "dedupe_cli:main"
flac-scan = "flac_scan:main"
flac-repair = "flac_repair:main"
flac-dedupe = "flac_dedupe:main"
flac-workflow = "flac_workflow:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry-core"

[tool.black]
line-length = 88
target-version = ['py38']

[tool.mypy]
python_version = "3.11"
# Core checks — keep a few useful warnings but relax untyped-def strictness
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]