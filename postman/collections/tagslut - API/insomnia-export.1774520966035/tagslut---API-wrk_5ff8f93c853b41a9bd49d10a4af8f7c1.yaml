type: collection.insomnia.rest/5.0
schema_version: "5.1"
name: tagslut - API
meta:
  id: wrk_5ff8f93c853b41a9bd49d10a4af8f7c1
  created: 1774520220934
  modified: 1774520220934
  description: ""
collection:
  - name: tagslut - API
    meta:
      id: fld_e6f98002a64f4c349878aab80a4886eb
      created: 1774520220934
      modified: 1774520220934
      sortKey: -1774520212353
      description: Postman collection for the tagslut music library management system.
        Covers Beatport API v4 authentication, catalog lookups (tracks,
        releases, ISRC), full-text search, and authenticated user library
        access. Used to enrich track metadata, resolve ISRCs, and drive the DJ
        pipeline ingestion workflow.
    children:
      - name: Auth
        meta:
          id: fld_030143c0dfa5488280dac09476a86b33
          created: 1774520220934
          modified: 1774520220934
          sortKey: -1774520212352
          description: OAuth2 Client Credentials flow for DJ app token.
        children:
          - url: "{{base_url}}/v4/auth/o/introspect/"
            name: Introspect Token
            meta:
              id: req_095603dfff814ac6b3bdcb3b5d809baf
              created: 1774520220935
              modified: 1774520220935
              isPrivate: false
              description: Validates and introspects an existing Bearer token against the
                Beatport OAuth2 server. Returns token metadata including active
                status and scopes. Useful for confirming a token is still valid
                before making batch catalog or enrichment requests.
              sortKey: -1774520212350
            method: GET
            authentication:
              type: bearer
              disabled: false
              token: "{{beatport_access_token}}"
              prefix: ""
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/auth/o/token/"
            name: Get Token (Client Credentials)
            meta:
              id: req_5f62fa3a2ec349d0bec434bbfd3c0b04
              created: 1774520220935
              modified: 1774520220935
              isPrivate: false
              description: Exchanges Beatport OAuth2 client credentials (client_id +
                client_secret) for a short-lived Bearer access token. The token
                is stored in the beatport_access_token environment variable and
                is required by all catalog, search, and library endpoints.
              sortKey: -1774520212351
            method: POST
            body:
              mimeType: application/x-www-form-urlencoded
              params:
                - name: grant_type
                  value: client_credentials
                  disabled: false
                - name: client_id
                  value: "{{beatport_client_id}}"
                  disabled: false
                - name: client_secret
                  value: "{{beatport_client_secret}}"
                  disabled: false
            headers:
              - name: Content-Type
                value: application/x-www-form-urlencoded
            scripts:
              preRequest: >-
                var expiresAt =
                insomnia.environment.get('beatport_token_expires_at');

                if (expiresAt) {
                    var secondsLeft = (parseInt(expiresAt) - Date.now()) / 1000;
                    if (secondsLeft < 60) {
                        console.warn('WARNING: Beatport token expires in ' + secondsLeft.toFixed(0) + 's — fetching new token.');
                    }
                }
              afterResponse: >-
                if (insomnia.response.code === 200) {
                    var json = insomnia.response.json();
                    if (json.access_token) {
                        insomnia.environment.set('beatport_access_token', json.access_token);
                        insomnia.environment.set('beatport_token_expires_at', String(Date.now() + (json.expires_in * 1000)));
                        console.log('Token set. Expires in: ' + json.expires_in + 's');
                    }
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
      - name: Catalog
        meta:
          id: fld_163993ef91c64e03982b634908d98e79
          created: 1774520220935
          modified: 1774520220935
          sortKey: -1774520212349
          description: >-
            Catalog endpoints. /v4/catalog/tracks/ accepts Bearer, basic, or
            cookie.

            /v4/catalog/tracks/store/{isrc}/ per OAS requires cookie or basic
            only.

            Phase 3d test: compare store/{isrc} vs ?isrc= response shape.
        children:
          - url: "{{base_url}}/v4/catalog/tracks/{{beatport_test_track_id}}/"
            name: Track by ID
            meta:
              id: req_3d834a0af0f44bb1a7d449e61ca09ad7
              created: 1774520220935
              modified: 1774520220935
              isPrivate: false
              description: Fetches the full catalog record for a single Beatport track by its
                numeric ID. Returns title, artists, BPM, key, genre, release
                date, label, and ISRC. Used during identity enrichment to
                populate track_identity metadata in the tagslut v3 database.
              sortKey: -1774520212348
            method: GET
            authentication:
              type: bearer
              disabled: false
              token: "{{beatport_access_token}}"
              prefix: ""
            scripts:
              afterResponse: >-
                var code = insomnia.response.code;

                console.log('Status: ' + code);


                if (code !== 200) {
                    console.log('FAILED — body: ' + insomnia.response.text().substring(0, 300));
                    return;
                }


                var json = insomnia.response.json();


                // ── Canonical field validation
                ────────────────────────────────────────

                var canonical = ['id', 'isrc', 'name', 'artists', 'bpm', 'key',
                'genre', 'mix_name'];

                canonical.forEach(function(f) {
                    var val = json[f];
                    if (val === null || val === undefined) {
                        console.log('WARNING: missing field ' + f);
                    } else {
                        console.log(f + ': ' + JSON.stringify(val).substring(0, 80));
                    }
                });


                // release.label is nested — check separately

                var label = json.release && json.release.label;

                if (!label) {
                    console.log('WARNING: missing field release.label');
                } else {
                    console.log('release.label: ' + JSON.stringify(label).substring(0, 80));
                }


                // ── Provider-linkable bonus fields
                ────────────────────────────────────

                var bonus = ['upc', 'copyright', 'version', 'explicit',
                'audioQuality'];

                var found = [];

                bonus.forEach(function(f) {
                    if (json[f] !== null && json[f] !== undefined) {
                        found.push(f + '=' + JSON.stringify(json[f]).substring(0, 40));
                    }
                });

                if (found.length > 0) {
                    console.log('Provider-linkable fields present: ' + found.join(', '));
                } else {
                    console.log('No provider-linkable bonus fields found in this response.');
                }


                // ── Chain variables
                ───────────────────────────────────────────────────

                if (json.id) {
                    insomnia.environment.set('beatport_last_track_id', json.id);
                    console.log('Set beatport_last_track_id = ' + json.id);
                }

                if (json.isrc) {
                    insomnia.environment.set('beatport_last_isrc', json.isrc);
                    console.log('Set beatport_last_isrc = ' + json.isrc);
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/catalog/releases/{{beatport_test_release_id}}/"
            name: Release by ID
            meta:
              id: req_46ae5a96c32f4001b3bb72a29e6186dd
              created: 1774520220936
              modified: 1774520220936
              isPrivate: false
              description: Retrieves the full catalog record for a Beatport release (album/EP)
                by its numeric release ID. Returns release title, label, catalog
                number, release date, and genre. Used to resolve release-level
                metadata when enriching track identities in the DJ pipeline.
              sortKey: -1774520212345
            method: GET
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/catalog/tracks/"
            name: Tracks by ISRC (query param)
            meta:
              id: req_6b6fd146dd4147a4b415ab518acbf2bd
              created: 1774520220936
              modified: 1774520220936
              isPrivate: false
              description: Looks up catalog tracks by ISRC using the standard query parameter
                format. Returns an array of matching track records. Used to
                cross-reference library files against Beatport catalog data
                during the enrichment pipeline phase.
              sortKey: -1774520212347
            method: GET
            parameters:
              - name: isrc
                value: "{{beatport_test_isrc}}"
                disabled: false
            scripts:
              afterResponse: >-
                // Phase 3d: log response shape for comparison with store/{isrc}

                if (insomnia.response.code === 200) {
                    var json = insomnia.response.json();
                    console.log('Type: ' + typeof json);
                    console.log('Is array: ' + Array.isArray(json.results || json));
                    console.log('Has count: ' + ('count' in json));
                    console.log('Has results: ' + ('results' in json));
                    if (json.results) console.log('Results count: ' + json.results.length);
                    if (json.results && json.results[0]) {
                        console.log('First result keys: ' + Object.keys(json.results[0]).join(', '));
                    }
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/catalog/tracks/store/{{beatport_test_isrc}}/"
            name: ISRC Store Lookup (path-based) [Phase 3d]
            meta:
              id: req_7d130c255bbf494ba045ba570f50396c
              created: 1774520220936
              modified: 1774520220936
              isPrivate: false
              description: Path-based ISRC store lookup using Basic Auth (client_id +
                client_secret). Part of Phase 3d testing to compare this
                endpoint's response shape against the ?isrc= query-param
                variant. Per OAS spec, this route requires cookie or basic auth
                only — Bearer tokens are not accepted.
              sortKey: -1774520212346
            method: GET
            authentication:
              type: basic
              username: "{{beatport_client_id}}"
              password: "{{beatport_client_secret}}"
              disabled: false
            scripts:
              afterResponse: >-
                console.log('Status: ' + insomnia.response.code);

                if (insomnia.response.code === 200) {
                    var json = insomnia.response.json();

                    // Response shape detection
                    var isPaginated = ('results' in json && 'count' in json);
                    var isDirect = ('id' in json && 'isrc' in json);
                    console.log('Response shape: ' + (isPaginated ? 'PAGINATED WRAPPER' : isDirect ? 'DIRECT RECORD' : 'UNKNOWN'));

                    // Field presence
                    var fields = ['id', 'isrc', 'name', 'artists', 'bpm', 'key', 'genre'];
                    var record = isPaginated ? (json.results && json.results[0]) : json;
                    if (record) {
                        fields.forEach(function(f) {
                            console.log('  ' + f + ': ' + (f in record ? JSON.stringify(record[f]).substring(0, 80) : 'MISSING'));
                        });
                    } else {
                        console.log('No record to inspect.');
                    }
                } else {
                    console.log('FAILED (' + insomnia.response.code + ') — check auth: try Basic (client_id/secret) or session cookie');
                    console.log('Body: ' + insomnia.response.text().substring(0, 200));
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/catalog/releases/{{beatport_test_release_id}}/tracks/"
            name: Release Tracks
            meta:
              id: req_80c40f3e90324c018d2c6640599d10bd
              created: 1774520220936
              modified: 1774520220936
              isPrivate: false
              description: Returns a paginated list of tracks belonging to a specific Beatport
                release. Fetches up to 100 tracks per page. Used to bulk-enrich
                track identities when ingesting an entire release into the
                tagslut v3 database during the intake pipeline.
              sortKey: -1774520212344
            method: GET
            parameters:
              - name: per_page
                value: "100"
                disabled: false
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
      - name: Search
        meta:
          id: fld_14b1fbe661af47f69df38080accb6bd3
          created: 1774520220937
          modified: 1774520220937
          sortKey: -1774520212343
          description: Search service. Uses Bearer token (HTTPBearer scheme).
        children:
          - url: "{{base_url}}/search/v1/tracks"
            name: Search Tracks by Text
            meta:
              id: req_62e6e663d469481c820b815ce4c297c3
              created: 1774520220937
              modified: 1774520220937
              isPrivate: false
              description: Full-text search across the Beatport catalog using the dedicated
                search service (v1). Accepts a free-text query and returns up to
                the specified count of matching tracks. Used to discover tracks
                by title or artist when the Beatport ID or ISRC is not known.
              sortKey: -1774520212342
            method: GET
            parameters:
              - name: q
                value: "{{beatport_search_query}}"
                disabled: false
              - name: count
                value: "10"
                disabled: false
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
      - name: My Library
        meta:
          id: fld_ffd5909e13aa41ceb79265ef43c4c804
          created: 1774520220937
          modified: 1774520220937
          sortKey: -1774520212341
          description: Authenticated user library endpoints. Bearer token required.
        children:
          - url: "{{base_url}}/v4/my/beatport/tracks/"
            name: My Beatport Tracks
            meta:
              id: req_30fbe3518ed7407f889c7fa5a1f22f2d
              created: 1774520220937
              modified: 1774520220937
              isPrivate: false
              description: Fetches the authenticated user's personal Beatport library ("My
                Beatport") — the tracks they have purchased or saved. Paginated
                by page and per_page. Used to cross-reference owned tracks
                against the tagslut library for intake decisions and duplicate
                detection.
              sortKey: -1774520212340
            method: GET
            parameters:
              - name: page
                value: "1"
                disabled: false
              - name: per_page
                value: "25"
                disabled: false
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/my/account/"
            name: My Account
            meta:
              id: req_fc55ed4e77654b4e998a97714b9b78a8
              created: 1774520220937
              modified: 1774520220937
              isPrivate: false
              description: Returns the authenticated user's Beatport account details including
                username, email, and subscription status. Used to verify the
                active session and confirm API access scope before running batch
                enrichment operations.
              sortKey: -1774520212339
            method: GET
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
      - name: Identity Verification
        meta:
          id: fld_3e065ba42edd4a15967ccbe40d53bdad
          created: 1774520220938
          modified: 1774520220938
          sortKey: -1774520212338
          description: Endpoints for verifying and cross-referencing track identities
            between Beatport catalog data and the local tagslut v3 database.
            Used during Phase 3 testing to validate ISRC resolution accuracy and
            response shape consistency.
        children:
          - url: https://api.spotify.com/v1/search
            name: 5c - Spotify ISRC Cross-Check
            meta:
              id: req_03b26dd6cf5646edbae67eece1aa11c0
              created: 1774520220938
              modified: 1774520220938
              isPrivate: false
              description: Cross-checks a Beatport-verified ISRC against the Spotify catalog.
                Step 5c in the identity verification workflow. Uses the Spotify
                Search API with an ISRC filter to confirm catalog presence and
                retrieve Spotify's track metadata for cross-platform enrichment
                validation.
              sortKey: -1774520212335
            method: GET
            parameters:
              - name: q
                value: isrc:{{beatport_verified_isrc}}
                disabled: false
              - name: type
                value: track
                disabled: false
            authentication:
              type: bearer
              disabled: false
              token: "{{spotify_access_token}}"
              prefix: ""
            scripts:
              afterResponse: >-
                var code = insomnia.response.code;

                console.log('[5c] Status: ' + code);


                if (code === 401) {
                    console.log('[5c] FAILED — 401 Unauthorized. Refresh spotify_access_token.');
                    return;
                }

                if (code !== 200) {
                    console.log('[5c] FAILED — body: ' + insomnia.response.text().substring(0, 300));
                    return;
                }


                var json  = insomnia.response.json();

                var items = json.tracks && json.tracks.items ? json.tracks.items
                : [];


                if (!items.length) {
                    console.log('[5c] WARNING: Spotify returned 0 results for ISRC ' +
                        insomnia.environment.get('beatport_verified_isrc'));
                    return;
                }


                var track        = items[0];

                var spotifyIsrc  = track.external_ids &&
                track.external_ids.isrc;

                var beatportIsrc =
                insomnia.environment.get('beatport_verified_isrc');


                console.log('[5c] beatport_isrc = ' + beatportIsrc);

                console.log('[5c] spotify_isrc  = ' + spotifyIsrc);


                if (spotifyIsrc && beatportIsrc && spotifyIsrc === beatportIsrc)
                {
                    console.log('[5c] CORROBORATED — Beatport + TIDAL + Spotify all agree: ' + beatportIsrc);
                } else {
                    console.log('[5c] CONFLICT: beatport_isrc=' + beatportIsrc +
                        ' spotify_isrc=' + spotifyIsrc);
                }


                // Log Spotify enrichment fields useful for provenance

                var extras = ['id', 'name', 'duration_ms', 'explicit',
                'popularity'];

                var found  = [];

                extras.forEach(function(f) {
                    if (track[f] !== null && track[f] !== undefined) {
                        found.push(f + '=' + JSON.stringify(track[f]).substring(0, 40));
                    }
                });

                if (found.length) {
                    console.log('[5c] Spotify enrichment fields: ' + found.join(', '));
                }


                // Store spotify_id for provenance

                if (track.id) {
                    insomnia.environment.set('spotify_verified_id', track.id);
                    console.log('[5c] Set spotify_verified_id = ' + track.id);
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: "{{base_url}}/v4/catalog/tracks/"
            name: 5a - Beatport ISRC Lookup
            meta:
              id: req_226014ef4d004f2eadb76828b867f129
              created: 1774520220938
              modified: 1774520220938
              isPrivate: false
              description: Looks up a track by the most recently processed ISRC (stored in
                beatport_last_isrc). Step 5a in the identity verification
                workflow. Compares the Beatport catalog response for a known
                ISRC to confirm round-trip data integrity after enrichment.
              sortKey: -1774520212337
            method: GET
            parameters:
              - name: isrc
                value: "{{beatport_last_isrc}}"
                disabled: false
            authentication:
              type: bearer
              disabled: false
              token: "{{beatport_access_token}}"
              prefix: ""
            scripts:
              afterResponse: >-
                var code = insomnia.response.code;

                console.log('[5a] Status: ' + code);


                if (code !== 200) {
                    console.log('[5a] FAILED — body: ' + insomnia.response.text().substring(0, 300));
                    return;
                }


                var json = insomnia.response.json();

                var results = json.results || (Array.isArray(json) ? json : []);


                if (!results.length) {
                    console.log('[5a] WARNING: Beatport returned 0 results for ISRC ' +
                        insomnia.environment.get('beatport_last_isrc'));
                    return;
                }


                var track = results[0];

                var bpId   = track.id;

                var bpIsrc = track.isrc;


                insomnia.environment.set('beatport_verified_id',   bpId);

                insomnia.environment.set('beatport_verified_isrc', bpIsrc);


                console.log('[5a] beatport_verified_id   = ' + bpId);

                console.log('[5a] beatport_verified_isrc = ' + bpIsrc);

                console.log('[5a] Results in page: ' + results.length +
                    (json.count !== undefined ? ' / total: ' + json.count : ''));
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
          - url: https://api.tidal.com/v1/tracks
            name: 5b - TIDAL ISRC Cross-Check
            meta:
              id: req_d1927d76d2c04f2892b368cd47e937cc
              created: 1774520220938
              modified: 1774520220938
              isPrivate: false
              description: Cross-checks a Beatport-verified ISRC against the TIDAL catalog.
                Step 5b in the identity verification workflow. Queries the TIDAL
                tracks API with the verified ISRC to confirm the track exists on
                TIDAL and to compare metadata for enrichment consistency.
              sortKey: -1774520212336
            method: GET
            parameters:
              - name: isrc
                value: "{{beatport_verified_isrc}}"
                disabled: false
              - name: countryCode
                value: US
                disabled: false
            authentication:
              type: bearer
              disabled: false
              token: "{{tidal_access_token}}"
              prefix: ""
            scripts:
              afterResponse: >-
                var code = insomnia.response.code;

                console.log('[5b] Status: ' + code);


                if (code !== 200) {
                    console.log('[5b] TIDAL request FAILED — body: ' +
                        insomnia.response.text().substring(0, 300));
                    return;
                }


                var json  = insomnia.response.json();

                var items = json.items || (Array.isArray(json) ? json : []);


                if (!items.length) {
                    console.log('[5b] WARNING: TIDAL returned 0 results for ISRC ' +
                        insomnia.environment.get('beatport_verified_isrc'));
                    return;
                }


                var tidalIsrc    = items[0].isrc;

                var beatportIsrc =
                insomnia.environment.get('beatport_verified_isrc');


                console.log('[5b] beatport_isrc = ' + beatportIsrc);

                console.log('[5b] tidal_isrc    = ' + tidalIsrc);


                if (tidalIsrc && beatportIsrc && tidalIsrc === beatportIsrc) {
                    console.log('[5b] CORROBORATED — both providers agree: ' + beatportIsrc);
                } else {
                    console.log('[5b] CONFLICT: beatport_isrc=' + beatportIsrc +
                        ' tidal_isrc=' + tidalIsrc);
                }


                // Log extra TIDAL fields useful for provenance enrichment

                var t = items[0];

                var extras = ['id', 'title', 'duration', 'explicit',
                'audioQuality', 'version'];

                var found = [];

                extras.forEach(function(f) {
                    if (t[f] !== null && t[f] !== undefined) {
                        found.push(f + '=' + JSON.stringify(t[f]).substring(0, 40));
                    }
                });

                if (found.length) {
                    console.log('[5b] TIDAL enrichment fields: ' + found.join(', '));
                }
            settings:
              renderRequestBody: true
              encodeUrl: true
              followRedirects: global
              cookies:
                send: true
                store: true
              rebuildPath: true
      - name: Validation Run
        meta:
          id: fld_a05e24c5cb254dcdbc1918575c5d6a27
          created: 1774520220938
          modified: 1774520220938
          sortKey: -1774520212334
          description: End-to-end validation run requests that walk through a complete
            ISRC resolution and cross-platform catalog check. Steps 6a+ resolve
            a known TIDAL or Beatport release down to individual ISRCs and
            verify each record across services.
        children:
          - url: "{{base_url}}/v4/catalog/tracks/{{beatport_test_track_id}}/"
            name: 6b - Track by ID (Validation)
            meta:
              id: req_4d883394c7344ea296d5ab948b3fe3ae
              created: 1774520220939
              modified: 1774520220939
              isPrivate: false
              description: "Validation step 6b: re-fetches a Beatport track by ID to confirm
                the resolved track_identity data in the local database matches
                the current live catalog response. Used to catch drift between
                cached enrichment data and Beatport's upstream record."
              sortKey: -1774520212332
            method: GET
            authentication:
              type: bearer
              disabled: false
              token: "{{beatport_access_token}}"
              prefix: ""
            scripts:
              afterResponse: >-
                var code = insomnia.response.code;

                console.log('[6b] Status: ' + code);


                if (code !== 200) {
                    console.log('[6b] FAILED — body: ' + insomnia.response.text().substring(0, 300));
                    return;
                }


                var json = insomnia.response.json();


                // Canonical field validation

                var canonical = ['id', 'isrc', 'name', 'artists', 'bpm', 'key',
