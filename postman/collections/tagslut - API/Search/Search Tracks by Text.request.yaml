$kind: http-request
description: Full-text search across the Beatport catalog using the dedicated
  search service (v1). Accepts a free-text query and returns up to the specified
  count of matching tracks. Used to discover tracks by title or artist when the
  Beatport ID or ISRC is not known.
url: "{{base_url}}/search/v1/tracks?q={{beatport_search_query}}&count=10"
method: GET
queryParams:
  q: "{{beatport_search_query}}"
  count: "10"
order: 1000
