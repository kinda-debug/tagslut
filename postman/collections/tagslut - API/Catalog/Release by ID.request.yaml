$kind: http-request
description: Retrieves the full catalog record for a Beatport release (album/EP)
  by its numeric release ID. Returns release title, label, catalog number,
  release date, and genre. Used to resolve release-level metadata when enriching
  track identities in the DJ pipeline.
url: "{{base_url}}/v4/catalog/releases/{{beatport_test_release_id}}/"
method: GET
order: 4000
