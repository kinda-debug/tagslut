name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          pip install poetry
          poetry install
      - name: Run Type Checks
        run: poetry run mypy .
      - name: Run Tests
        run: poetry run pytest
      - name: Run Repo Surface Audit
        run: poetry run python scripts/audit_repo_layout.py
      - name: Run CLI/Docs Consistency Audit
        run: poetry run python scripts/check_cli_docs_consistency.py
      - name: Run Policy Lint
        run: poetry run python scripts/lint_policy_profiles.py
