$kind: collection
name: tagslut - API
description: |-
  Tagslut API collection — Beatport v4, TIDAL v2 JSON:API, and Spotify Web API.

  ## Environment contract
  Use postman/environments/tagslut.environment.yaml (YAML source) or its
  exported JSON equivalent as the runnable environment.

  Required runtime variables (all must be present in the env):
    base_url                  — https://api.beatport.com
    beatport_client_id        — OAuth client ID
    beatport_client_secret    — OAuth client secret
    beatport_access_token     — set by Auth > Get Beatport Token
    beatport_token_expires_at — set by Auth > Get Beatport Token
    beatport_last_isrc        — set by Identity Verification > 5a
    beatport_last_track_id    — set by Catalog > Track by ID
    beatport_verified_id      — set by Validation Run > 6b
    beatport_verified_isrc    — set by Validation Run > 6b
    beatport_test_isrc        — static test ISRC (e.g. USQX91300105)
    beatport_test_track_id    — static test track ID
    beatport_test_release_id  — static test release ID
    beatport_search_query     — static search query string
    tidal_access_token        — Bearer token for TIDAL v2
    tidal_seed_track_id       — set by Identity Verification > 5b
    tidal_seed_isrc           — set by Identity Verification > 5b
    spotify_access_token      — Bearer token for Spotify
    spotify_verified_id       — set by Identity Verification > 5c

  Operator/filesystem variables (ROOT_TD, ROOT_BP, TAGSLUT_DB, etc.) live
  in the separate env.environment.yaml and must NOT be merged here.
