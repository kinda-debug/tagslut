$kind: http-request
url: "{{base_url}}/v4/auth/o/token/"
method: POST
headers:
  Content-Type: application/x-www-form-urlencoded
body:
  type: urlencoded
  content:
    grant_type: client_credentials
    client_id: "{{beatport_client_id}}"
    client_secret: "{{beatport_client_secret}}"
auth:
  type: noauth
scripts:
  - type: beforeRequest
    code: >-
      var expiresAt = pm.environment.get('beatport_token_expires_at');

      if (expiresAt) {
          var secondsLeft = (parseInt(expiresAt) - Date.now()) / 1000;
          if (secondsLeft < 60) {
              console.warn('WARNING: Beatport token expires in ' + secondsLeft.toFixed(0) + 's — fetching new token.');
          }
      }
    language: text/javascript
  - type: afterResponse
    code: >-
      if (pm.response.code === 200) {
          var json = pm.response.json();
          if (json.access_token) {
              pm.environment.set('beatport_access_token', json.access_token);
              pm.environment.set('beatport_token_expires_at', String(Date.now() + (json.expires_in * 1000)));
              console.log('Token set. Expires in: ' + json.expires_in + 's');
          }
      }
    language: text/javascript
order: 1000
